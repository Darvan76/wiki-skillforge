site_name: Darvan's Skillforge
site_description: Documentación oficial del sistema avanzado de Skill Trees para DarkRP — 28 efectos, 12 permisos, 6 integraciones, 9 árboles por defecto
site_url: https://darvan76.github.io/wiki-skillforge/
repo_url: https://github.com/Darvan76/wiki-skillforge
repo_name: Darvan76/wiki-skillforge
edit_uri: blob/master/docs/
copyright: Copyright &copy; 2026 Darvan Development

theme:
  name: material
  logo: assets/images/logo.svg
  favicon: assets/images/favicon.svg
  icon:
    repo: fontawesome/brands/github
    annotation: material/star-four-points
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.action.edit
    - header.autohide

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Darvan76/wiki-skillforge
      name: GitHub
    - icon: fontawesome/solid/cart-shopping
      link: https://www.gmodstore.com/market/skillforge
      name: GModStore
  generator: false


extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - es
        - fr
  # - git-revision-date-localized:
  #     enable_creation_date: true
  #     type: datetime
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
  - glightbox
  - tags

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

